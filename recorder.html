<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record/Encode Audio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1rem;
            background: #fafafa;
            color: #333;
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .subtitle { color: #666; margin-bottom: 1.5rem; }
        h2 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; }
        .formats {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .formats label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            cursor: pointer;
            user-select: none;
        }
        .controls { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
        button {
            padding: 0.5rem 1.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.15s, border-color 0.15s;
        }
        button:hover:not(:disabled) { background: #f0f0f0; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.recording { background: #fee; border-color: #c44; color: #c44; }
        #recordings { list-style: none; }
        #recordings li {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        #recordings a {
            color: #0066cc;
            text-decoration: none;
            display: block;
            margin-bottom: 0.5rem;
            word-break: break-all;
        }
        #recordings a:hover { text-decoration: underline; }
        #recordings audio { width: 100%; }
        #log {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 4px;
            padding: 0.75rem;
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Audio Recorder</h1>
    <p class="subtitle">Record and encode audio in multiple formats using Web APIs</p>

    <div class="formats">
        <label><input type="checkbox" id="fmt-wav" checked> WAV</label>
        <label><input type="checkbox" id="fmt-mp3" checked> MP3</label>
        <label><input type="checkbox" id="fmt-ogg" checked> OGG</label>
    </div>

    <div class="controls">
        <button id="btn-record">Record</button>
        <button id="btn-stop" disabled>Stop</button>
    </div>

    <h2>Recordings</h2>
    <ul id="recordings"></ul>

    <h2>Log</h2>
    <pre id="log"></pre>

    <script type="module" src="js/app.js"></script>
</body>
</html>
