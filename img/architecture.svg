<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a" viewBox="0 0 10 7" refX="9" refY="3.5" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0,0 L10,3.5 L0,7z" fill="#888"/>
    </marker>
  </defs>

  <rect width="600" height="520" fill="#fafafa"/>

  <!-- APP -->
  <rect x="220" y="20" width="160" height="50" rx="8" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="300" y="42" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">App</text>
  <text x="300" y="58" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">app.js</text>

  <!-- App → UI -->
  <path d="M260,70 L130,100" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="185" y="80" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">events</text>

  <!-- App → AudioCapture -->
  <path d="M340,70 L400,100" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <text x="380" y="80" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#aaa" text-anchor="middle">pipeline</text>

  <!-- UI -->
  <rect x="40" y="102" width="180" height="50" rx="8" fill="#e8f0fe" stroke="#4a86c8" stroke-width="1.5"/>
  <text x="130" y="124" font-family="Helvetica,Arial,sans-serif" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">UI</text>
  <text x="130" y="140" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">ui.js</text>

  <!-- AUDIO CAPTURE GROUP -->
  <rect x="280" y="95" width="295" height="405" rx="10" fill="none" stroke="#c9940a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="427" y="112" font-family="Helvetica,Arial,sans-serif" font-size="11" font-weight="bold" fill="#c9940a" text-anchor="middle">AudioCapture</text>
  <text x="427" y="125" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#c9940a" text-anchor="middle">audio-capture.js</text>

  <!-- Microphone -->
  <rect x="358" y="140" width="140" height="50" rx="8" fill="#fef9e7" stroke="#d4ac0d" stroke-width="1.5"/>
  <text x="428" y="162" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">Microphone</text>
  <text x="428" y="178" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">getUserMedia</text>

  <!-- Mic → ScriptProcessor -->
  <path d="M428,190 L428,215" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- ScriptProcessor -->
  <rect x="343" y="218" width="170" height="50" rx="8" fill="#fef9e7" stroke="#d4ac0d" stroke-width="1.5"/>
  <text x="428" y="240" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">ScriptProcessor</text>
  <text x="428" y="256" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">AudioContext</text>

  <!-- ScriptProcessor → NoiseReducer -->
  <path d="M428,268 L428,293" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- NoiseReducer -->
  <rect x="348" y="296" width="160" height="44" rx="8" fill="#fdf2e9" stroke="#e67e22" stroke-width="1.5"/>
  <text x="428" y="315" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">NoiseReducer</text>
  <text x="428" y="331" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">noise-reducer.js</text>

  <!-- NoiseReducer → Encoders -->
  <path d="M390,340 L340,368" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M428,340 L428,368" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M466,340 L516,368" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- WAV -->
  <rect x="296" y="370" width="84" height="56" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="338" y="392" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">WAV</text>
  <text x="338" y="407" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">Worker</text>
  <text x="338" y="420" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">wavWorker.js</text>

  <!-- MP3 -->
  <rect x="386" y="370" width="84" height="56" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="428" y="392" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">MP3</text>
  <text x="428" y="407" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">Worker</text>
  <text x="428" y="420" font-family="Helvetica,Arial,sans-serif" font-size="9" fill="#888" text-anchor="middle">mp3Worker.js</text>

  <!-- OGG -->
  <rect x="476" y="370" width="84" height="56" rx="8" fill="#eafaf1" stroke="#27ae60" stroke-width="1.5"/>
  <text x="518" y="392" font-family="Helvetica,Arial,sans-serif" font-size="13" font-weight="bold" fill="#333" text-anchor="middle">OGG</text>
  <text x="518" y="407" font-family="Helvetica,Arial,sans-serif" font-size="10" fill="#666" text-anchor="middle">MediaRecorder</text>

  <!-- Encoders → Output -->
  <path d="M338,426 L380,455" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M428,426 L428,455" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>
  <path d="M518,426 L476,455" stroke="#888" stroke-width="1.5" fill="none" marker-end="url(#a)"/>

  <!-- Output -->
  <rect x="335" y="458" width="186" height="30" rx="8" fill="#f4ecf7" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="428" y="477" font-family="Helvetica,Arial,sans-serif" font-size="11" fill="#8e44ad" text-anchor="middle">.wav / .mp3 / .ogg files</text>
</svg>
